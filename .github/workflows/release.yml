name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v1.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        shell: pwsh
        run: |
          if ($env:WIN_CSC_LINK -and $env:WIN_CSC_KEY_PASSWORD) {
            $env:CSC_IDENTITY_AUTO_DISCOVERY = "true"
          } else {
            Write-Host "Windows signing secrets are incomplete; building unsigned installer."
            Remove-Item Env:\WIN_CSC_LINK -ErrorAction SilentlyContinue
            Remove-Item Env:\WIN_CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
            $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          }

          pnpm build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            dist/*.exe
          if-no-files-found: error
          retention-days: 5

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Apple API key
        shell: bash
        run: |
          if [[ -z "$APPLE_API_KEY_BASE64" || -z "$APPLE_API_KEY_ID" ]]; then
            echo "Apple API key secrets are incomplete; Apple ID notarization credentials may still be used."
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/apple-api-key"
          api_key_path="$RUNNER_TEMP/apple-api-key/AuthKey_${APPLE_API_KEY_ID}.p8"
          if ! printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$api_key_path"; then
            printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$api_key_path" || {
              echo "Failed to decode APPLE_API_KEY_BASE64." >&2
              exit 1
            }
          fi
          chmod 600 "$api_key_path"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - name: Build macOS DMG
        shell: bash
        run: |
          pnpm exec electron-vite build

          unset APPLE_API_KEY
          has_notarization_credentials=false
          if [[ -f "$APPLE_API_KEY_PATH" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" ]]; then
            export APPLE_API_KEY="$APPLE_API_KEY_PATH"
            has_notarization_credentials=true
          elif [[ -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            has_notarization_credentials=true
          fi

          if [[ -n "$CSC_LINK" && -n "$CSC_KEY_PASSWORD" && "$has_notarization_credentials" == "true" ]]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=true
            pnpm exec electron-builder --mac -c.mac.notarize=true
          else
            echo "macOS signing/notarization secrets are incomplete; building unsigned DMGs."
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            pnpm exec electron-builder --mac -c.mac.identity=null -c.mac.notarize=false
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api-key/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: |
            dist/*.dmg
          if-no-files-found: error
          retention-days: 5

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build AppImage + deb only (snap requires snapcraft login)
      - name: Build Linux packages
        run: pnpm exec electron-vite build && pnpm exec electron-builder --linux AppImage deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
          retention-days: 5

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.exe *.dmg *.AppImage *.deb > SHA256SUMS.txt
          echo "## SHA256 Checksums" > checksums.md
          echo '```' >> checksums.md
          cat SHA256SUMS.txt >> checksums.md
          echo '```' >> checksums.md
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          append_body: true
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: artifacts/checksums.md
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/SHA256SUMS.txt
